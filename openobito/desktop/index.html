<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAgent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
    }
    #status {
      padding: 8px 16px;
      border-top: 1px solid #21262d;
      color: #8b949e;
      font-size: 12px;
    }
    .dim { color: #484f58; }
    .user { color: #58a6ff; }
    .assistant { color: #3fb950; }
    .error { color: #f85149; }
    .system { color: #8b949e; font-style: italic; }
  </style>
</head>
<body>
  <div id="output"></div>
  <div id="status">Connecting to OpenAgent…</div>
  <script>
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    window.openagent.onOutput((data) => {
      const div = document.createElement("div");
      div.textContent = data;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
      status.textContent = "Connected";
    });

    window.openagent.onError((data) => {
      const div = document.createElement("div");
      div.className = "error";
      div.textContent = data;
      output.appendChild(div);
    });

    window.openagent.onExit((code) => {
      status.textContent = `Agent exited (code ${code})`;
    });
  </script>
</body>
</html>
