name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci
      - run: npm run lint
      - name: Check formatting
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts" 2>/dev/null || echo "No prettier config found, skipping"
